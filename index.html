<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Joint Ledger</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#12151A;
    --bg-panel:#181C22;
    --bg-elevated:#1F252C;
    --bg-input:#21272F;
    --rule: rgba(120,150,135,0.14);
    --rule-strong: rgba(120,150,135,0.28);
    --ink:#EAE7DE;
    --ink-dim:#9BA3A6;
    --ink-faint:#6B7378;
    --emerald:#4FD1AE;
    --emerald-dim: rgba(79,209,174,0.14);
    --amber:#E8A33D;
    --amber-dim: rgba(232,163,61,0.14);
    --red:#D9736A;
    --red-dim: rgba(217,115,106,0.14);
    --font-display: 'Iowan Old Style','Palatino Linotype', Georgia, 'Times New Roman', serif;
    --font-mono: 'SF Mono','Consolas','Liberation Mono', Menlo, monospace;
    --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink); font-family:var(--font-ui);
    min-height:100vh;
  }
  #app{ display:flex; min-height:100vh; }

  /* ---- Sidebar ---- */
  .sidebar{
    width:230px; flex-shrink:0; background:var(--bg-panel);
    border-right:1px solid var(--rule-strong);
    padding:22px 16px; display:flex; flex-direction:column; gap:22px;
  }
  .brand{ font-family:var(--font-display); font-size:20px; letter-spacing:0.02em; line-height:1.25; }
  .brand small{ display:block; font-family:var(--font-ui); font-size:10px; letter-spacing:0.14em; color:var(--ink-faint); text-transform:uppercase; margin-top:4px;}
  .profile-switch{ display:flex; flex-direction:column; gap:6px; }
  .profile-btn{
    background:var(--bg-elevated); border:1px solid var(--rule-strong); color:var(--ink-dim);
    padding:9px 12px; border-radius:6px; font-size:13px; text-align:left; cursor:pointer;
    font-family:var(--font-ui); transition:all .12s ease;
  }
  .profile-btn.active{ background:var(--emerald-dim); border-color:var(--emerald); color:var(--emerald); font-weight:600; }
  .profile-btn:hover:not(.active){ border-color:var(--ink-faint); color:var(--ink);}
  .top-switch-row{ display:flex; justify-content:flex-end; gap:8px; margin-bottom:18px; }
  .top-switch-btn{ padding:7px 14px; text-align:center; border-radius:20px; font-size:12.5px; }
  @media(max-width:900px){ .top-switch-row{ justify-content:flex-start; flex-wrap:wrap; } }
  nav.navlist{ display:flex; flex-direction:column; gap:2px; }
  .navlink{
    padding:9px 10px; border-radius:6px; cursor:pointer; font-size:13.5px; color:var(--ink-dim);
    border-left:2px solid transparent;
  }
  .navlink:hover{ color:var(--ink); background:rgba(255,255,255,0.02); }
  .navlink.active{ color:var(--ink); background:rgba(79,209,174,0.08); border-left:2px solid var(--emerald); font-weight:600;}
  .sidebar-foot{ margin-top:auto; font-size:10.5px; color:var(--ink-faint); line-height:1.6; }

  /* ---- Main ---- */
  main{ flex:1; padding:30px 40px 60px; max-width:1180px; }
  .page-title{ font-family:var(--font-display); font-size:28px; margin:0 0 4px; }
  .page-sub{ color:var(--ink-dim); font-size:13.5px; margin:0 0 26px; }

  .ledger-card{
    background: repeating-linear-gradient(var(--bg-elevated), var(--bg-elevated) 27px, var(--rule) 28px);
    border:1px solid var(--rule-strong); border-radius:10px; padding:20px 22px; margin-bottom:20px;
  }
  .plain-card{ background:var(--bg-elevated); border:1px solid var(--rule-strong); border-radius:10px; padding:20px 22px; margin-bottom:20px; }
  .card-title{ font-family:var(--font-display); font-size:16px; margin:0 0 14px; display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .card-title .eyebrow{ font-family:var(--font-ui); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-faint); font-weight:600;}

  .grid-3{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  .grid-4{ display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
  .grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media(max-width:900px){ .grid-3{grid-template-columns:1fr;} .grid-4{grid-template-columns:repeat(2,1fr);} .grid-2{grid-template-columns:1fr;} main{padding:20px;} .sidebar{width:180px;} }

  .stat-box{ padding:2px 0; }
  .stat-label{ font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-faint); margin-bottom:6px;}
  .stat-value{ font-family:var(--font-mono); font-size:23px; font-weight:600; }
  .stat-value.small{ font-size:17px; }

  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th{ text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-faint); padding:6px 8px; border-bottom:1px solid var(--rule-strong); font-weight:600;}
  td{ padding:8px; border-bottom:1px solid var(--rule); font-family:var(--font-mono); }
  td.txt{ font-family:var(--font-ui); }
  tr:last-child td{ border-bottom:none; }
  .neg{ color:var(--red); }
  .pos{ color:var(--emerald); }

  .stamp{
    display:inline-block; font-family:var(--font-ui); font-size:9px; font-weight:700; letter-spacing:0.08em;
    text-transform:uppercase; color:var(--emerald); border:1.5px solid var(--emerald); border-radius:3px;
    padding:2px 6px; transform:rotate(-3deg); opacity:0.85;
  }

  button.btn{
    background:var(--emerald); color:#0C1210; border:none; padding:9px 16px; border-radius:6px;
    font-family:var(--font-ui); font-size:13px; font-weight:600; cursor:pointer;
  }
  button.btn:hover{ filter:brightness(1.08); }
  button.btn:disabled{ opacity:0.5; cursor:not-allowed; }
  button.btn.ghost{ background:transparent; border:1px solid var(--rule-strong); color:var(--ink-dim); }
  button.btn.ghost:hover{ border-color:var(--ink-faint); color:var(--ink); }
  button.btn.danger{ background:var(--red-dim); color:var(--red); border:1px solid var(--red); }
  button.btn.amber{ background:var(--amber); color:#241705;}
  button.icon-btn{ background:none; border:none; color:var(--ink-faint); cursor:pointer; font-size:14px; padding:2px 6px;}
  button.icon-btn:hover{ color:var(--red); }

  input[type=text], input[type=number], input[type=date], select, textarea{
    background:var(--bg-input); border:1px solid var(--rule-strong); color:var(--ink);
    padding:7px 9px; border-radius:5px; font-family:var(--font-ui); font-size:13px; width:100%;
  }
  input:focus, select:focus, textarea:focus{ outline:2px solid var(--emerald); outline-offset:1px; border-color:var(--emerald);}
  label.field-label{ font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-faint); display:block; margin-bottom:4px; font-weight:600;}
  .field{ margin-bottom:12px; }
  .field-row{ display:flex; gap:10px; }
  .field-row > .field{ flex:1; }

  .upload-zone{
    border:1.5px dashed var(--rule-strong); border-radius:8px; padding:26px; text-align:center;
    color:var(--ink-dim); font-size:13px; margin-bottom:14px;
  }
  .upload-zone.hasfile{ border-color:var(--emerald); color:var(--emerald); }

  .row-table-add{ font-size:12px; color:var(--emerald); cursor:pointer; margin-top:6px; display:inline-block;}
  .empty-state{ color:var(--ink-faint); font-size:13px; padding:20px 0; text-align:center; }
  .loader{ display:inline-block; width:13px; height:13px; border:2px solid var(--rule-strong); border-top-color:var(--emerald); border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:6px;}
  @keyframes spin{ to{ transform:rotate(360deg);} }
  .pill{ display:inline-block; font-size:10.5px; padding:2px 8px; border-radius:20px; background:var(--bg-input); color:var(--ink-dim); margin-left:6px;}
  .divider{ height:1px; background:var(--rule-strong); margin:16px 0; border:none; }
  .notice{ font-size:12px; color:var(--ink-faint); background:var(--bg-input); border-radius:6px; padding:10px 12px; line-height:1.5; }
  .asset-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:14px; }
  .asset-tile{ background:var(--bg-input); border:1px solid var(--rule-strong); border-radius:8px; padding:12px; }
  .asset-tile img{ width:100%; height:100px; object-fit:cover; border-radius:5px; margin-bottom:8px; background:var(--bg-panel);}
  .asset-name{ font-size:13.5px; font-weight:600; margin-bottom:2px; }
  .asset-meta{ font-size:11px; color:var(--ink-faint); margin-bottom:6px;}
  .asset-value{ font-family:var(--font-mono); font-size:14px; }
  a.linklike{ color:var(--emerald); cursor:pointer; font-size:12.5px; }
  ::-webkit-scrollbar{ width:8px; height:8px;} ::-webkit-scrollbar-thumb{ background:var(--rule-strong); border-radius:4px;}

  /* ---- Login screen ---- */
  #login-screen{ position:fixed; inset:0; background:radial-gradient(ellipse at top, #1c2129 0%, #0C0E11 70%); z-index:9000; display:flex; align-items:center; justify-content:center; }
  #login-screen.hidden{ display:none; }
  .login-box{ background:var(--bg-elevated); border:1px solid var(--rule-strong); border-radius:12px; padding:34px; width:340px; max-width:92vw; box-shadow:0 24px 70px rgba(0,0,0,.45); }
  .login-brand{ text-align:center; margin-bottom:26px; }
  .login-brand .lb-title{ font-family:var(--font-display); font-size:22px; }
  .login-brand .lb-sub{ font-size:11px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:0.1em; margin-top:4px; }
  .login-err{ background:var(--red-dim); color:var(--red); border:1px solid var(--red); border-radius:6px; padding:9px 12px; font-size:12.5px; margin-bottom:14px; display:none; }
  .login-err.show{ display:block; }
  .login-btn{ width:100%; margin-top:6px; }

  /* ---- User pill / roles ---- */
  .user-row{ display:flex; align-items:center; gap:8px; padding:8px; background:var(--bg-elevated); border:1px solid var(--rule-strong); border-radius:8px; margin-bottom:4px; }
  .avatar{ width:26px; height:26px; border-radius:50%; background:var(--emerald-dim); color:var(--emerald); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; }
  .user-meta{ flex:1; min-width:0; }
  .user-meta .un{ font-size:12.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .role-badge{ font-size:9.5px; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-faint); }
  .logout-link{ font-size:11px; color:var(--ink-faint); cursor:pointer; text-decoration:underline; }
  .logout-link:hover{ color:var(--red); }
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <div class="login-brand">
      <div class="lb-title">The Joint Ledger</div>
      <div class="lb-sub">Sign in to continue</div>
    </div>
    <div class="login-err" id="l-err"></div>
    <div class="field"><label class="field-label">Username</label><input type="text" id="l-user" autocomplete="username"></div>
    <div class="field"><label class="field-label">Password</label><input type="password" id="l-pass" autocomplete="current-password"></div>
    <button class="btn login-btn" id="l-btn" onclick="doLogin()">Sign in</button>
    <div style="text-align:center; margin-top:14px;"><span class="logout-link" onclick="toggleRecoveryPanel()">Trouble signing in?</span></div>

    <div id="recovery-panel" style="display:none; margin-top:16px; padding-top:16px; border-top:1px solid var(--rule-strong);">
      <div style="font-size:12px; color:var(--ink-faint); margin-bottom:12px; line-height:1.5;">
        Reset any account's password directly using the <strong>AUTH_SECRET</strong> value from your Vercel project's
        Environment Variables. Use this only if you're locked out of every account.
      </div>
      <div class="login-err" id="r-err"></div>
      <div class="login-err" id="r-ok" style="background:var(--emerald-dim); color:var(--emerald); border-color:var(--emerald);"></div>
      <div class="field"><label class="field-label">Username to reset</label><input type="text" id="r-user" autocomplete="off"></div>
      <div class="field"><label class="field-label">New password</label><input type="password" id="r-newpass" autocomplete="new-password"></div>
      <div class="field"><label class="field-label">AUTH_SECRET (from Vercel)</label><input type="password" id="r-secret" autocomplete="off"></div>
      <button class="btn ghost login-btn" id="r-btn" onclick="doRecovery()">Reset password</button>
    </div>
  </div>
</div>
<div id="app"></div>

<script>
/* ============================= STATE ============================= */
const STATE = {
  ready:false,
  currentProfile: 'a', // 'a' | 'b' | 'house'
  view: 'dashboard',
  settings: null,
  salary: { a:[], b:[] },
  expenses: { a:[], b:[] },
  snapshots: [], // shared/consolidated cash & investment holdings, not split per profile
  assets: [],
  recurring: { a:[], b:[] },
  govtBenefits: { a:[], b:[] },
  draft: null, // in-progress extraction review object
};
let authToken = localStorage.getItem('ledger_token') || '';
let currentUser = null; // { id, username, name, role }

const CATEGORY_OPTIONS = ['Groceries','Dining','Travel','Utilities','Shopping','Fuel','Subscriptions','Health','Education','Fees & Charges','Other'];
const ASSET_CATEGORIES = ['Property','Vehicle','Jewelry','Electronics','Furniture','Other'];
const INVESTMENT_TYPES = ['Stocks','Mutual Fund','Bonds','Crypto','Real Estate','Retirement Fund','Other'];
const FREQUENCY_OPTIONS = ['weekly','monthly','yearly'];
const GOVT_PROGRAMS = ['SSS','PhilHealth','Pag-IBIG','Pag-IBIG MP2','GSIS','Other'];
const GOVT_ENTRY_TYPES = ['Contribution','Benefit / Claim','Loan Repayment','Other'];
const CURRENCY_SUGGESTIONS = ['PHP','USD','INR','SGD','MYR','IDR','THB','VND','EUR','GBP','AED','AUD','JPY','HKD','KRW','CNY'];
function currencyDatalistHTML(){
  return `<datalist id="ledgerCurrencyList">${CURRENCY_SUGGESTIONS.map(c=>`<option value="${c}">`).join('')}</datalist>`;
}

function defaultSettings(){
  return {
    id:'settings',
    baseCurrency:'PHP',
    rates:{ PHP:1, USD:58, EUR:63, SGD:43, GBP:73, AED:15.8, JPY:0.39, AUD:38, INR:0.70, THB:1.65, VND:0.0023, IDR:0.0036, MYR:12.3 },
    profileNames:{ a:'Jitesh', b:'Partner' }
  };
}

/* ============================= AUTH ============================= */
const authHdr = () => ({ 'Content-Type':'application/json', 'Authorization':'Bearer '+authToken });

async function doLogin(){
  const btn = document.getElementById('l-btn'), err = document.getElementById('l-err');
  const user = document.getElementById('l-user').value.trim();
  const pass = document.getElementById('l-pass').value;
  if(!user || !pass){ showLoginErr('Enter your username and password'); return; }
  btn.disabled = true; btn.textContent = 'Signing in…'; err.classList.remove('show');
  try{
    const r = await fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'login', username:user, password:pass }) });
    const json = await r.json();
    if(!r.ok){ showLoginErr(json.error || 'Login failed'); return; }
    authToken = json.token;
    localStorage.setItem('ledger_token', authToken);
    currentUser = json.user;
    await bootApp();
  }catch(e){ showLoginErr('Could not reach the server. Check your connection.'); }
  finally{ btn.disabled = false; btn.textContent = 'Sign in'; }
}
function showLoginErr(msg){ const el = document.getElementById('l-err'); el.textContent = msg; el.classList.add('show'); }
function toggleRecoveryPanel(){
  const panel = document.getElementById('recovery-panel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}
async function doRecovery(){
  const btn = document.getElementById('r-btn');
  const errEl = document.getElementById('r-err'), okEl = document.getElementById('r-ok');
  errEl.classList.remove('show'); okEl.classList.remove('show');
  const username = document.getElementById('r-user').value.trim();
  const newPassword = document.getElementById('r-newpass').value;
  const recoveryKey = document.getElementById('r-secret').value;
  if(!username || !newPassword || !recoveryKey){
    errEl.textContent = 'Fill in all three fields.'; errEl.classList.add('show'); return;
  }
  btn.disabled = true; btn.textContent = 'Resetting…';
  try{
    const r = await fetch('/api/auth', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'recover-password', recoveryKey, username, newPassword })
    });
    const json = await r.json();
    if(!r.ok){ errEl.textContent = json.error || 'Reset failed'; errEl.classList.add('show'); return; }
    okEl.textContent = 'Password reset. You can sign in below with the new password now.';
    okEl.classList.add('show');
    document.getElementById('l-user').value = username;
    document.getElementById('l-pass').value = '';
    document.getElementById('r-newpass').value = '';
    document.getElementById('r-secret').value = '';
  }catch(e){
    errEl.textContent = 'Could not reach the server. Check your connection.'; errEl.classList.add('show');
  }finally{
    btn.disabled = false; btn.textContent = 'Reset password';
  }
}
function logout(){
  authToken = ''; currentUser = null;
  localStorage.removeItem('ledger_token');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('l-user').value = ''; document.getElementById('l-pass').value = '';
  document.getElementById('l-err').classList.remove('show');
}
async function bootApp(){
  document.getElementById('login-screen').classList.add('hidden');
  STATE.currentProfile = currentUser?.profile || 'a';
  await loadAll();
  render();
  startPolling();
}

/* ============================= DATA LAYER (per-collection writes against one consolidated blob) ============================= */
// Collections: settings (single row), salary_a/b, expenses_a/b, snapshots (shared), assets, recurring_a/b
async function apiSave(col, item){
  try{
    const r = await fetch('/api/data?col='+col, { method:'POST', headers: authHdr(), body: JSON.stringify({ op:'save', item }) });
    if(r.status === 401){ logout(); return null; }
    return await r.json();
  }catch(e){ console.error('apiSave failed', col, e); return null; }
}
async function apiDelete(col, id){
  try{
    const r = await fetch('/api/data?col='+col, { method:'POST', headers: authHdr(), body: JSON.stringify({ op:'delete', id }) });
    if(r.status === 401){ logout(); return null; }
    return await r.json();
  }catch(e){ console.error('apiDelete failed', col, e); return null; }
}
async function apiReplace(col, arr){
  try{
    const r = await fetch('/api/data?col='+col, { method:'POST', headers: authHdr(), body: JSON.stringify({ op:'replace', data: arr }) });
    if(r.status === 401){ logout(); return null; }
    return await r.json();
  }catch(e){ console.error('apiReplace failed', col, e); return null; }
}

async function loadAll(){
  try{
    const r = await fetch('/api/data', { headers: authHdr(), cache:'no-store' });
    if(r.status === 401){ logout(); return; }
    const json = await r.json();
    const state = json.data || {};
    STATE.settings = state.settings || defaultSettings();
    STATE.salary = { a: state.salary_a||[], b: state.salary_b||[] };
    STATE.expenses = { a: state.expenses_a||[], b: state.expenses_b||[] };
    STATE.snapshots = state.snapshots || [];
    STATE.assets = state.assets || [];
    STATE.recurring = { a: state.recurring_a||[], b: state.recurring_b||[] };
    STATE.govtBenefits = { a: state.govtbenefits_a||[], b: state.govtbenefits_b||[] };
    STATE.ready = true;
  }catch(e){
    console.error('loadAll failed', e);
    if(!STATE.settings) STATE.settings = defaultSettings();
    STATE.ready = true;
  }
}
async function saveSettings(){ await apiSave('settings', STATE.settings); }

// Event-driven sync instead of a constant timer: refresh when you come back to the tab
// (visibility/focus), plus a manual "Refresh" link. This keeps Vercel Blob read counts low
// enough to stay within the free tier - a fixed-interval poll running the whole time the
// app is open adds up fast across two people.
let lastSyncAt = 0;
const MIN_SYNC_GAP_MS = 10000;
async function syncNow(force){
  if(!authToken || STATE.draft) return;
  const now = Date.now();
  if(!force && now - lastSyncAt < MIN_SYNC_GAP_MS) return;
  lastSyncAt = now;
  const prevView = STATE.view, prevProfile = STATE.currentProfile;
  await loadAll();
  STATE.view = prevView; STATE.currentProfile = prevProfile;
  render();
}
function startPolling(){
  document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState === 'visible') syncNow(false); });
  window.addEventListener('focus', ()=> syncNow(false));
}
function manualRefresh(){ syncNow(true); }

/* ============================= HELPERS ============================= */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function canEdit(){ return !!(currentUser && currentUser.role !== 'viewer'); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function num(v){ const n = parseFloat(v); return isNaN(n) ? 0 : n; }
function otherProfile(p){ return p==='a' ? 'b' : 'a'; }
function profileName(p){ return STATE.settings.profileNames[p] || (p==='a'?'Partner A':'Partner B'); }

function money(amount, code){
  if(amount==null || isNaN(amount)) return '<span style="color:var(--ink-faint)">—</span>';
  const neg = amount < 0; const abs = Math.abs(amount);
  let f;
  try{ f = new Intl.NumberFormat('en-US',{style:'currency',currency:(code||'PHP'),maximumFractionDigits:2}).format(abs); }
  catch(e){ f = (code||'') + ' ' + abs.toFixed(2); }
  return neg ? `<span class="neg">(${f})</span>` : `<span class="${amount>0?'pos':''}">${f}</span>`;
}
function toBase(amount, code){
  const r = STATE.settings.rates[code]; 
  return amount * (r==null ? 1 : r);
}
function monthlyEquivalent(amount, freq){
  if(freq==='weekly') return amount * 52 / 12;
  if(freq==='yearly') return amount / 12;
  return amount; // monthly (default)
}
function fmtDate(d){
  if(!d) return '—';
  try{ return new Date(d+'T00:00:00').toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}); }
  catch(e){ return d; }
}

function readFileAsBase64(file){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload = ()=> resolve(r.result.split(',')[1]);
    r.onerror = ()=> reject(new Error('Could not read file'));
    r.readAsDataURL(file);
  });
}
function resizeImageToBase64(file, maxDim){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      let w = img.width, h = img.height;
      if(w > h && w > maxDim){ h = Math.round(h*maxDim/w); w = maxDim; }
      else if(h >= w && h > maxDim){ w = Math.round(w*maxDim/h); h = maxDim; }
      const c = document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      resolve(c.toDataURL('image/jpeg', 0.75));
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); reject(new Error('image load failed')); };
    img.src = url;
  });
}

/* ============================= AI EXTRACTION (via /api/extract) ============================= */
async function extractDocument(base64, mimeType, kind){
  const resp = await fetch('/api/extract', {
    method:'POST', headers: authHdr(),
    body: JSON.stringify({ base64, mimeType, kind })
  });
  const data = await resp.json();
  if(!resp.ok || data.error){ throw new Error(data.error || 'Extraction failed'); }
  return data;
}

function latestSnapshot(){ const arr = STATE.snapshots||[]; if(!arr.length) return null; return [...arr].sort((x,y)=> x.date < y.date ? 1 : -1)[0]; }
function snapshotTotalBase(s){
  if(!s) return 0;
  let t = 0;
  (s.cash||[]).forEach(c=> t += toBase(num(c.amount), c.currency));
  (s.investments||[]).forEach(i=> t += toBase(num(i.value), i.currency));
  return t;
}
function snapshotCurrencyTotals(s){
  const totals = {};
  if(!s) return totals;
  (s.cash||[]).forEach(c=>{ const code=(c.currency||'').toUpperCase()||STATE.settings.baseCurrency; totals[code]=(totals[code]||0)+num(c.amount); });
  (s.investments||[]).forEach(i=>{ const code=(i.currency||'').toUpperCase()||STATE.settings.baseCurrency; totals[code]=(totals[code]||0)+num(i.value); });
  return totals;
}
function mergeCurrencyTotals(...totalsList){
  const merged = {};
  totalsList.forEach(t=> Object.keys(t).forEach(code=> merged[code]=(merged[code]||0)+t[code]));
  return merged;
}
function currencyPillsHTML(totals){
  const codes = Object.keys(totals).sort((a,b)=> toBase(totals[b],b)-toBase(totals[a],a));
  if(!codes.length) return '<span style="color:var(--ink-faint)">—</span>';
  return codes.map(code=>`<span class="pill">${money(totals[code], code)}</span>`).join(' ');
}
function assetsTotalBase(profileFilter){
  return STATE.assets.filter(a=> profileFilter==='house' ? true : a.owner===profileFilter)
    .reduce((t,a)=> t + toBase(num(a.value), a.currency), 0);
}
function monthExpenseTotalBase(p, monthsBack=0){
  const now = new Date(); now.setMonth(now.getMonth()-monthsBack);
  const ym = now.toISOString().slice(0,7);
  const list = p==='house' ? [...STATE.expenses.a, ...STATE.expenses.b] : STATE.expenses[p];
  return list.filter(st=> (st.statement_date||'').slice(0,7) === ym)
    .reduce((t,st)=> t + toBase(num(st.total_amount_due), st.currency), 0);
}

async function onSalaryFileChosen(input){
  const file = input.files[0]; if(!file) return;
  const status = document.getElementById('salaryExtractStatus');

  try{
    const base64 = await readFileAsBase64(file);
    const json = await extractDocument(base64, file.type || 'application/pdf', 'salary');
    STATE.draft = { kind:'salary', data:{
      pay_date: json.pay_date || '', employer: json.employer || '', currency: (json.currency||STATE.settings.baseCurrency).toUpperCase(),
      gross_pay: json.gross_pay ?? null, net_pay: json.net_pay ?? null,
      deductions: Array.isArray(json.deductions) ? json.deductions : [], allowances: Array.isArray(json.allowances) ? json.allowances : []
    }};
    render();
  }catch(e){
    status.innerHTML = `<div class="notice" style="margin-top:10px;color:var(--red)">Couldn't extract that file automatically (${esc(e.message||'unknown error')}). You can enter it manually instead.</div>`;

// Recognizes government-program deductions on a payslip (SSS, PhilHealth, Pag-IBIG, GSIS)
// so they can be auto-logged as contributions under Government Benefits too.
function matchGovtProgram(label){
  const l = (label||'').toLowerCase();
  if(l.includes('sss')) return 'SSS';
  if(l.includes('philhealth') || l.includes('phic')) return 'PhilHealth';
  if(l.includes('mp2')) return 'Pag-IBIG MP2';
  if(l.includes('pag-ibig') || l.includes('pagibig') || l.includes('hdmf')) return 'Pag-IBIG';
  if(l.includes('gsis')) return 'GSIS';
  return null;
}
async function saveDraftSalary(p){
  const d = STATE.draft.data;
  const entry = { id: uid(), pay_date: d.pay_date, employer: d.employer, currency:(d.currency||'').toUpperCase()||STATE.settings.baseCurrency,
    gross_pay: num(d.gross_pay), net_pay: num(d.net_pay), deductions: d.deductions||[], allowances: d.allowances||[] };
  STATE.salary[p].push(entry);
  await apiSave('salary_'+p, entry);

  // Auto-log matching deductions as Government Benefits contributions.
  const matched = (entry.deductions||[]).filter(ded=> matchGovtProgram(ded.label) && num(ded.amount) > 0);
  for(const ded of matched){
    const gEntry = { id: uid(), program: matchGovtProgram(ded.label), entryType:'Contribution', date: entry.pay_date,
      amount: num(ded.amount), currency: entry.currency, notes: `Auto-added from ${entry.employer||'salary'} slip dated ${fmtDate(entry.pay_date)}` };
    STATE.govtBenefits[p].push(gEntry);
    await apiSave('govtbenefits_'+p, gEntry);
  }

  STATE.draft = null;
  render();
}
async function deleteSalary(p, id){
  STATE.salary[p] = STATE.salary[p].filter(s=>s.id!==id);
  await apiDelete('salary_'+p, id);
  render();
}

  }));
  const rows = all.sort((a,b)=>(b.statement_date||'').localeCompare(a.statement_date||''))

function drawCategoryChart(){
  const canvas = document.getElementById('categoryChart');
  if(!canvas || typeof Chart==='undefined') return;
  const cats = JSON.parse(canvas.dataset.cats || '{}');
  const labels = Object.keys(cats);
  if(!labels.length) return;
  new Chart(canvas.getContext('2d'), {
    type:'doughnut',
    data:{ labels, datasets:[{ data: labels.map(l=>cats[l]), backgroundColor:['#4FD1AE','#E8A33D','#D9736A','#6FA8DC','#B48EAD','#8FBF8F','#D9B14F','#7C93C3','#C97C7C','#9BA3A6','#5FBFB3'] }] },
    options:{ plugins:{ legend:{ position:'right', labels:{ color:'#EAE7DE', boxWidth:12, font:{size:11} } } } }
  });
}

async function onSoaFileChosen(input){
  const file = input.files[0]; if(!file) return;
  const status = document.getElementById('soaExtractStatus');
  status.innerHTML = `<div class="notice" style="margin-top:10px;"><span class="loader"></span>Reading the statement and pulling out transactions…</div>`;
  try{
    const base64 = await readFileAsBase64(file);
    const json = await extractDocument(base64, file.type || 'application/pdf', 'soa');
    STATE.draft = { kind:'expense', data:{
      statement_date: json.statement_date || '', card_name: json.card_name || '', currency:(json.currency||STATE.settings.baseCurrency).toUpperCase(),
      total_amount_due: json.total_amount_due ?? null, minimum_amount_due: json.minimum_amount_due ?? null,
      transactions: Array.isArray(json.transactions) ? json.transactions : []
    }};
    render();
  }catch(e){
    status.innerHTML = `<div class="notice" style="margin-top:10px;color:var(--red)">Couldn't extract that file automatically (${esc(e.message||'unknown error')}). You can enter it manually instead.</div>`;
  }
}
function startManualExpense(p){
  STATE.draft = { kind:'expense', data:{ statement_date:'', card_name:'', currency:STATE.settings.baseCurrency, total_amount_due:null, minimum_amount_due:null, transactions:[] } };
  render();
}
async function saveDraftExpense(p){
  const d = STATE.draft.data;
  const entry = { id: uid(), statement_date: d.statement_date, card_name: d.card_name, currency:(d.currency||'').toUpperCase()||STATE.settings.baseCurrency,
    total_amount_due: num(d.total_amount_due), minimum_amount_due: d.minimum_amount_due!=null ? num(d.minimum_amount_due) : null, transactions: d.transactions||[] };
  STATE.expenses[p].push(entry);
  await apiSave('expenses_'+p, entry);
  STATE.draft = null;
  render();
}
async function deleteExpense(p, id){
  STATE.expenses[p] = STATE.expenses[p].filter(s=>s.id!==id);
  await apiDelete('expenses_'+p, id);
  render();
}

    (STATE.recurring[p]||[]).filter(r=>r.active!==false).forEach(r=>{
      total += toBase(monthlyEquivalent(num(r.amount), r.frequency), r.currency);
    });
  });
  return total;
}

/* ============================= GOVERNMENT BENEFITS VIEW ============================= */
function govtBenefitsTotalsByProgram(profileFilter){
  const profiles = profileFilter==='house' ? ['a','b'] : [profileFilter];
  const totals = {};
  profiles.forEach(p=>{
    (STATE.govtBenefits[p]||[]).forEach(g=>{
      const key = g.program || 'Other';
      totals[key] = (totals[key]||0) + toBase(num(g.amount), g.currency);
    });
  });
  return totals;
}
function viewGovtBenefits(){
  const isHouse = STATE.currentProfile === 'house';
  if(isHouse) return viewGovtBenefitsHousehold();
  const p = STATE.currentProfile;
  const list = [...(STATE.govtBenefits[p]||[])].sort((a,b)=> (b.date||'').localeCompare(a.date||''));
  const totals = govtBenefitsTotalsByProgram(p);
  const rows = list.map(g=>`
    <tr>
      <td class="txt">${fmtDate(g.date)}</td>
      <td class="txt">${esc(g.program||'Other')}</td>
      <td class="txt">${esc(g.entryType||'Contribution')}</td>
      <td>${money(g.amount, g.currency)}</td>
      <td class="txt">${esc(g.notes||'')}</td>
      <td>${canEdit() ? `<a class="linklike" onclick="startEditGovtBenefit('${p}','${g.id}')">edit</a> · <button class="icon-btn" onclick="deleteGovtBenefit('${p}','${g.id}')">✕</button>` : ''}</td>
    </tr>`).join('');
  const totalPills = Object.keys(totals).length
    ? Object.keys(totals).map(k=>`<span class="pill">${esc(k)}: ${money(totals[k], STATE.settings.baseCurrency)}</span>`).join(' ')
    : '<span style="color:var(--ink-faint)">—</span>';

  return `
  <h1 class="page-title">Government Benefits</h1>
  <p class="page-sub">${esc(profileName(p))}'s SSS, PhilHealth, Pag-IBIG, and similar records — entered manually, separate from payslip deductions.</p>

  <div class="ledger-card" style="margin-bottom:20px;">
    <div class="stat-label">Totals by program</div>
    <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:8px;">${totalPills}</div>
  </div>

  ${draftGovtBenefitHTML(p)}

  ${canEdit() ? `<div class="plain-card">
    <div class="card-title">Already have salary slips saved? <span class="eyebrow">Backfill</span></div>
    <p style="font-size:12.5px; color:var(--ink-dim); margin:0 0 10px;">Slips saved before this feature existed won't have created these automatically. Run this once to pull SSS/PhilHealth/Pag-IBIG/GSIS deductions from ${esc(profileName(p))}'s existing salary history into the list below (skips anything already added).</p>
    <button class="btn ghost" onclick="syncGovtBenefitsFromSalary('${p}')">Sync from salary history</button>
  </div>` : ''}

  <div class="plain-card">
    <div class="card-title">All entries <span class="eyebrow">${list.length}</span></div>
    ${rows ? `<table><tr><th>Date</th><th>Program</th><th>Type</th><th>Amount</th><th>Notes</th><th></th></tr>${rows}</table>` : `<div class="empty-state">Nothing added yet.</div>`}
  </div>`;
}

    .map(g=>`<tr><td class="txt">${esc(profileName(g._p))}</td><td class="txt">${fmtDate(g.date)}</td><td class="txt">${esc(g.program||'Other')}</td><td class="txt">${esc(g.entryType||'Contribution')}</td><td>${money(g.amount,g.currency)}</td></tr>`).join('');

async function saveDraftGovtBenefit(p){
  const d = STATE.draft.data;
  const entry = { id: d.id||uid(), program: d.program||'Other', entryType: d.entryType||'Contribution', date: d.date||'',
    amount: num(d.amount), currency:(d.currency||'').toUpperCase()||STATE.settings.baseCurrency, notes: d.notes||'' };
  STATE.govtBenefits[p] = STATE.govtBenefits[p].filter(g=>g.id!==entry.id);
  STATE.govtBenefits[p].push(entry);
  await apiSave('govtbenefits_'+p, entry);
  STATE.draft = null;

async function deleteGovtBenefit(p, id){

  await apiDelete('govtbenefits_'+p, id);
  render();
}
async function syncGovtBenefitsFromSalary(p){
  const existing = STATE.govtBenefits[p]||[];
  const alreadyLogged = (date, program, amount) => existing.some(g=>
    g.date===date && g.program===program && Math.abs(num(g.amount)-amount) < 0.01 && (g.notes||'').startsWith('Auto-added from')
  );
  let added = 0;
  for(const s of (STATE.salary[p]||[])){
    for(const ded of (s.deductions||[])){
      const program = matchGovtProgram(ded.label);
      const amount = num(ded.amount);
      if(!program || amount <= 0) continue;
      if(alreadyLogged(s.pay_date, program, amount)) continue;
      const gEntry = { id: uid(), program, entryType:'Contribution', date: s.pay_date, amount,
        currency: s.currency||STATE.settings.baseCurrency, notes: `Auto-added from ${s.employer||'salary'} slip dated ${fmtDate(s.pay_date)}` };
      STATE.govtBenefits[p].push(gEntry);
      await apiSave('govtbenefits_'+p, gEntry);
      added++;
    }
  }
  alert(added ? `Added ${added} entr${added===1?'y':'ies'} from salary history.` : 'Nothing new to add — everything matching was already logged.');
  render();
}

    <tr><td class="txt">${esc(code)}</td><td><input type="number" step="0.0001" value="${rates[code]}" oninput="updateRate('${code}',this.value)" ${ro}></td>
    <td>${canEdit() ? `<button class="icon-btn" onclick="removeRate('${code}')">✕</button>` : ''}</td></tr>`).join('');
  return `

  <p class="page-sub">Rates are entered manually — this tool doesn't pull live exchange rates, so keep these updated yourself.</p>

  <div class="plain-card">
    <div class="card-title">Profile names</div>
    <div class="field-row">
      <div class="field"><label class="field-label">Profile A</label><input type="text" value="${esc(STATE.settings.profileNames.a)}" oninput="updateProfileName('a',this.value)" ${ro}></div>
      <div class="field"><label class="field-label">Profile B</label><input type="text" value="${esc(STATE.settings.profileNames.b)}" oninput="updateProfileName('b',this.value)" ${ro}></div>
    </div>
  </div>

  <div class="plain-card">
    <div class="card-title">Base currency</div>
    <div class="field" style="max-width:160px;"><input type="text" value="${esc(STATE.settings.baseCurrency)}" oninput="updateBaseCurrency(this.value.toUpperCase())" ${ro}></div>
  </div>

  <div class="plain-card">
    <div class="card-title">Exchange rates <span class="eyebrow">1 unit of currency = ? ${esc(STATE.settings.baseCurrency)}</span></div>
    <table><tr><th>Currency</th><th>Value in ${esc(STATE.settings.baseCurrency)}</th><th></th></tr>${rateRows}</table>
    ${canEdit() ? `<div style="display:flex; gap:8px; margin-top:12px;">

  <div class="plain-card">
    <div class="card-title">Data &amp; privacy</div>
    <div class="notice">Everything saved here — salary, statements, snapshots, assets — lives in one shared database. Anyone with a login on this site can see it. Updates sync automatically when you switch back to this tab, or anytime via the <strong>Refresh</strong> link in the sidebar. Manage who has access under <strong>Users</strong> (admin only).</div>
    ${currentUser?.role==='admin' ? `<div style="margin-top:14px;"><button class="btn danger" onclick="confirmResetAll()">Clear all data</button></div>` : ''}
  </div>`;
}
async function updateProfileName(p, val){ STATE.settings.profileNames[p] = val; await saveSettings(); }
async function updateBaseCurrency(val){ STATE.settings.baseCurrency = val; await saveSettings(); render(); }
async function updateRate(code, val){ STATE.settings.rates[code] = num(val); await saveSettings(); }
async function removeRate(code){ delete STATE.settings.rates[code]; await saveSettings(); render(); }
async function addRate(){
  const input = document.getElementById('newRateCode');
  const code = (input.value||'').trim().toUpperCase();
  if(!code) return;
  STATE.settings.rates[code] = STATE.settings.rates[code] || 1;
  await saveSettings();
  render();
}
function confirmResetAll(){
  if(!confirm('This will erase all salary, statement, snapshot, and asset data in the shared database. This cannot be undone. Continue?')) return;
  resetAll();
}
async function resetAll(){
  STATE.settings = defaultSettings(); STATE.salary = {a:[],b:[]}; STATE.expenses = {a:[],b:[]}; STATE.snapshots = []; STATE.assets = []; STATE.recurring = {a:[],b:[]}; STATE.govtBenefits = {a:[],b:[]};
  await Promise.all([
    apiReplace('settings', [STATE.settings]),
    apiReplace('salary_a', []), apiReplace('salary_b', []),
    apiReplace('expenses_a', []), apiReplace('expenses_b', []),
    apiReplace('snapshots', []),
    apiReplace('assets', []),
    apiReplace('recurring_a', []), apiReplace('recurring_b', []),
    apiReplace('govtbenefits_a', []), apiReplace('govtbenefits_b', [])
  ]);
  render();
}

/* ============================= USERS (admin only) ============================= */
let usersListCache = null;
function viewUsers(){
  if(!(currentUser && currentUser.role==='admin')){
    return `<h1 class="page-title">Users</h1><div class="notice">Admin access is required to manage users.</div>`;
  }
  if(usersListCache === null){
    loadUsersList();
    return `<h1 class="page-title">Users</h1><p class="page-sub">Loading…</p>`;
  }
  const rows = usersListCache.map(u=>`
    <tr>
      <td class="txt">${esc(u.username)}</td>
      <td class="txt">${esc(u.name)}</td>
      <td class="txt">${esc(u.role)}</td>
      <td class="txt">${esc(profileName(u.profile||'a'))}</td>
      <td><a class="linklike" onclick="startEditUser('${u.id}','${esc(u.username)}','${esc(u.name)}','${u.role}','${u.profile||'a'}')">edit</a>
        ${u.id!==currentUser.id ? ` · <a class="linklike" style="color:var(--red)" onclick="deleteUserAccount('${u.id}')">remove</a>` : ''}</td>
    </tr>`).join('');
  return `
  <h1 class="page-title">Users</h1>
  <p class="page-sub">Accounts that can sign in to this ledger. Each account maps to one of the two data profiles below; viewers can look but not edit.</p>
  ${draftUserHTML()}
  <div class="plain-card">
    <div class="card-title">All accounts <span class="eyebrow">${usersListCache.length}</span></div>
    <table><tr><th>Username</th><th>Name</th><th>Role</th><th>Data profile</th><th></th></tr>${rows || '<tr><td colspan="5" style="color:var(--ink-faint);font-family:var(--font-ui)">None yet</td></tr>'}</table>
  </div>`;
}
async function loadUsersList(){
  try{
    const r = await fetch('/api/auth', { method:'POST', headers: authHdr(), body: JSON.stringify({ action:'list-users' }) });
    const json = await r.json();
    usersListCache = json.users || [];
  }catch(e){ usersListCache = []; }
  render();
}
function draftUserHTML(){
  if(!(STATE.draft && STATE.draft.kind==='user')){
    return `<div class="plain-card"><div class="card-title">Add a user</div><button class="btn" onclick="startAddUser()">+ Add user</button></div>`;
  }
  const d = STATE.draft.data;
  return `
  <div class="plain-card">
    <div class="card-title">${d.id?'Edit user':'New user'}</div>
    <div class="field-row">
      <div class="field"><label class="field-label">Username</label><input type="text" value="${esc(d.username||'')}" oninput="updateDraftField('username',this.value)"></div>
      <div class="field"><label class="field-label">Full name</label><input type="text" value="${esc(d.name||'')}" oninput="updateDraftField('name',this.value)"></div>
    </div>
    <div class="field-row">
      <div class="field"><label class="field-label">Role</label>
        <select onchange="updateDraftField('role',this.value)">
          <option value="admin" ${d.role==='admin'?'selected':''}>Admin — manages users too</option>
          <option value="editor" ${d.role==='editor'?'selected':''}>Editor — full access to entries</option>
          <option value="viewer" ${d.role==='viewer'?'selected':''}>Viewer — read-only</option>
        </select>
      </div>
      <div class="field"><label class="field-label">Data profile <span style="text-transform:none;font-weight:400">(which salary/expenses/assets this login owns)</span></label>
        <select onchange="updateDraftField('profile',this.value)">
          <option value="a" ${d.profile!=='b'?'selected':''}>${esc(profileName('a'))}</option>
          <option value="b" ${d.profile==='b'?'selected':''}>${esc(profileName('b'))}</option>
        </select>
      </div>
    </div>
    <div class="field"><label class="field-label">Password ${d.id?'<span style="text-transform:none;font-weight:400">(leave blank to keep current)</span>':''}</label><input type="password" autocomplete="new-password" name="new-user-password-field" oninput="updateDraftField('password',this.value)"></div>
    <hr class="divider">
    <div style="display:flex; gap:10px;">
      <button class="btn" onclick="saveDraftUser()">Save user</button>
      <button class="btn ghost" onclick="cancelDraft()">Discard</button>
    </div>
  </div>`;
}
function startAddUser(){ STATE.draft = { kind:'user', data:{ id:'', username:'', name:'', role:'editor', profile:'a', password:'' } }; render(); }
function startEditUser(id, username, name, role, profile){ STATE.draft = { kind:'user', data:{ id, username, name, role, profile: profile||'a', password:'' } }; render(); }
async function saveDraftUser(){
  const d = STATE.draft.data;
  if(!d.username || !d.name){ alert('Username and full name are required'); return; }
  if(!d.id && !d.password){ alert('Password is required for new users'); return; }
  const r = await fetch('/api/auth', { method:'POST', headers: authHdr(), body: JSON.stringify({
    action:'save-user', userId: d.id||undefined, userUsername: d.username, userName: d.name, userRole: d.role, userProfile: d.profile||'a', userPassword: d.password||undefined
  }) });
  const json = await r.json();
  if(!r.ok){ alert(json.error||'Save failed'); return; }
  STATE.draft = null; usersListCache = null;
  render();
}
async function deleteUserAccount(id){
  if(!confirm('Remove this user? They will no longer be able to sign in.')) return;
  await fetch('/api/auth', { method:'POST', headers: authHdr(), body: JSON.stringify({ action:'delete-user', userId:id }) });
  usersListCache = null;
  render();
}

/* ============================= POST-RENDER HOOKS ============================= */
function afterRenderHooks(){
  if(STATE.view==='dashboard'){ drawNetWorthChart(); drawRecurringChart(); }
  if(STATE.view==='expenses' && STATE.currentProfile==='house') drawCategoryChart();
}

/* ============================= INIT ============================= */
document.getElementById('l-pass').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
document.getElementById('l-user').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('l-pass').focus(); });

(async function init(){
  render();
  if(authToken){
    try{
      const r = await fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'verify', token: authToken }) });
      const json = await r.json();
      if(r.ok && json.user){
        currentUser = json.user;
        await bootApp();
        return;
      }
    }catch(e){ /* fall through to login */ }
  }
  document.getElementById('login-screen').classList.remove('hidden');
})();
</script>
